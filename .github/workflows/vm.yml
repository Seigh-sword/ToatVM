name: ToatVM Session

# ToatVM: a "virtual machine" that actually lives inside a GitHub Actions
# runner. This workflow runs a Docker container of the chosen OS, creates a
# user account inside it, and exposes its shell to the browser through a
# tunnel (ttyd + cloudflared).
#
# New in 0.3.0:
#   - Environment variables passed into the container
#   - Pre-run / post-run scripts
#   - Resource limits and disk size
#   - Session templates via workflow inputs
#   - Port forwards

on:
  workflow_dispatch:
    inputs:
      lifetime:
        description: "Minutes each cycle runs before caching + restart"
        required: false
        default: "60"
      username:
        description: "Shell username inside the VM"
        required: false
        default: "toat"
      password:
        description: "Account password (random if blank)"
        required: false
        default: ""
      image:
        description: "Base OS image (docker)"
        required: false
        default: "ubuntu:latest"
        type: choice
        options:
          - ubuntu:latest
          - debian:latest
          - archlinux:latest
          - alpine:latest
          - fedora:latest
          - kalilinux/kali-rolling
      env:
        description: "Environment variables (JSON object)"
        required: false
        default: "{}"
      pre-run:
        description: "Shell script to run inside the VM before starting the shell"
        required: false
        default: ""
      post-run:
        description: "Shell script to run inside the VM after the cycle ends"
        required: false
        default: ""
      disk-size:
        description: "Disk size for the container (GB)"
        required: false
        default: "10"
      cpu-limit:
        description: "CPU limit for the container (cores)"
        required: false
        default: "1"
      mem-limit:
        description: "Memory limit for the container (GB)"
        required: false
        default: "2"
      ports:
        description: "Port forwards (host:container,...)"
        required: false
        default: ""
      label:
        description: "Session label"
        required: false
        default: ""
  repository_dispatch:
    types: [toatvm-boot]

concurrency:
  group: toatvm
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  vm:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore VM state
        uses: actions/cache/restore@v4
        with:
          path: |
            vm-state
          key: toatvm-state-${{ github.run_id }}
          restore-keys: |
            toatvm-state-

      - name: Install runtime (ttyd + cloudflared + jq)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openssl jq
          curl -fsSL https://github.com/tsl0922/ttyd/releases/download/1.7.4/ttyd.x86_64 \
            -o /usr/local/bin/ttyd
          chmod +x /usr/local/bin/ttyd
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          docker version --format '{{.Server.Version}}' || true

      - name: Parse inputs
        id: inputs
        env:
          INPUT_ENV: ${{ github.event.inputs.env || '{}' }}
        run: |
          echo "cpu=$(echo '${{ github.event.inputs.cpu-limit || '1' }}' | tr -d ' ')" >> "$GITHUB_OUTPUT"
          echo "mem=$(echo '${{ github.event.inputs.mem-limit || '2' }}' | tr -d ' ')" >> "$GITHUB_OUTPUT"
          echo "disk=$(echo '${{ github.event.inputs.disk-size || '10' }}' | tr -d ' ')" >> "$GITHUB_OUTPUT"
          echo "pre=$(cat <<'EOF'
          ${{ github.event.inputs.pre-run || '' }}
          EOF
          )" >> "$GITHUB_OUTPUT"
          echo "post=$(cat <<'EOF'
          ${{ github.event.inputs.post-run || '' }}
          EOF
          )" >> "$GITHUB_OUTPUT"

      - name: Boot VM session
        id: boot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          STOP=$(gh variable get VM_STOP 2>/dev/null || true)
          if [ -n "$STOP" ]; then
            echo "VM_STOP is set - not starting. Boot again from the site to run."
            exit 0
          fi

          USERNAME="${{ github.event.inputs.username || 'toat' }}"
          PASSWORD="${{ github.event.inputs.password }}"
          IMAGE="${{ github.event.inputs.image || 'ubuntu:latest' }}"
          [ -z "$PASSWORD" ] && PASSWORD=$(openssl rand -base64 12)

          CPU_LIMIT="${{ steps.inputs.outputs.cpu }}"
          MEM_LIMIT="${{ steps.inputs.outputs.mem }}"
          DISK_SIZE="${{ steps.inputs.outputs.disk }}"
          PRE_RUN="${{ steps.inputs.outputs.pre }}"
          POST_RUN="${{ steps.inputs.outputs.post }}"

          mkdir -p vm-state
          [ -f vm-state/.booted ] || echo "first boot $(date -u)" > vm-state/.booted

          PORTS_ARGS=""
          if [ -n "${{ github.event.inputs.ports }}" ]; then
            IFS=',' read -ra PORTS <<< "${{ github.event.inputs.ports }}"
            for p in "${PORTS[@]}"; do
              PORTS_ARGS="$PORTS_ARGS -p $p"
            done
          fi

          docker rm -f toatvm 2>/dev/null || true

          docker run -d --name toatvm \
            --cpus="${CPU_LIMIT}" \
            --memory="${MEM_LIMIT}g" \
            --storage-opt size="${DISK_SIZE}G" \
            $PORTS_ARGS \
            -v "$PWD/vm-state":/home/"$USERNAME" \
            "$IMAGE" sleep infinity

          ENV_JSON="${{ github.event.inputs.env || '{}' }}"
          ENV_LINES=$(echo "$ENV_JSON" | jq -r 'to_entries[]? | "\(.key)=\(.value)"' 2>/dev/null || true)

          docker exec toatvm sh -c "
            id '$USERNAME' >/dev/null 2>&1 || (useradd -M -s /bin/bash '$USERNAME' 2>/dev/null || useradd -M '$USERNAME' 2>/dev/null || adduser -D '$USERNAME' 2>/dev/null)
            echo '$USERNAME:$PASSWORD' | chpasswd 2>/dev/null || echo '$PASSWORD' | passwd --stdin '$USERNAME' 2>/dev/null || true
            chown -R '$USERNAME' /home/'$USERNAME' 2>/dev/null || true
            usermod -aG sudo '$USERNAME' 2>/dev/null || usermod -aG wheel '$USERNAME' 2>/dev/null || true
            mkdir -p /etc/toatvm
            echo '$USERNAME' > /etc/toatvm/user
            echo '$PASSWORD' > /etc/toatvm/pass
            echo \"$PRE_RUN\" > /etc/toatvm/pre-run.sh
            chmod +x /etc/toatvm/pre-run.sh
            echo \"$POST_RUN\" > /etc/toatvm/post-run.sh
            chmod +x /etc/toatvm/post-run.sh
          " || true

          if [ -n "$ENV_LINES" ]; then
            while IFS='=' read -r key value; do
              [ -z "$key" ] && continue
              docker exec toatvm sh -c "echo '$key=$value' >> /etc/environment" || true
            done <<< "$ENV_LINES"
          fi

          if [ -n "$PRE_RUN" ]; then
            docker exec toatvm su - "$USERNAME" -c "/etc/toatvm/pre-run.sh" 2>/dev/null || true
          fi

          SHARE_PASS=$(gh variable get VM_PASS 2>/dev/null || true)
          TTYD_AUTH=""
          if [ -n "$SHARE_PASS" ]; then
            TTYD_AUTH="-c toat:$SHARE_PASS"
            echo "Sharing enabled (password protected)."
          fi

          nohup ttyd -p 7681 $TTYD_AUTH docker exec -it -w /home/"$USERNAME" toatvm su - "$USERNAME" \
            >/tmp/ttyd.log 2>&1 &

          nohup cloudflared tunnel --url http://localhost:7681 --no-autoupdate \
            >/tmp/cf.log 2>&1 &

          for i in $(seq 1 30); do
            URL=$(grep -oE 'https://[a-z0-9.-]+\.trycloudflare\.com' /tmp/cf.log | head -n1 || true)
            [ -n "$URL" ] && break
            sleep 2
          done

          if [ -z "$URL" ]; then
            echo "::error::Could not establish tunnel"; cat /tmp/cf.log; exit 1
          fi

          echo "VM_URL=$URL" >> "$GITHUB_OUTPUT"
          echo "VM_CRED=user=$USERNAME pass=$PASSWORD" >> "$GITHUB_OUTPUT"
          echo "ToatVM is live at $URL"
          echo "ToatVM credentials: user=$USERNAME pass=$PASSWORD"
          echo "ToatVM is live at $URL" >> "$GITHUB_STEP_SUMMARY"
          gh variable set VM_URL --body "$URL" --repo "$GITHUB_REPOSITORY" \
            2>/dev/null || echo "note: VM_URL variable not set (needs workflow write perms; logs still work)"

          if [ -n "${{ github.event.inputs.label }}" ]; then
            gh variable set VM_LABEL --body "${{ github.event.inputs.label }}" --repo "$GITHUB_REPOSITORY" \
              2>/dev/null || true
          fi

          LIFETIME="${{ github.event.inputs.lifetime || '60' }}"
          echo "Running cycle for ${LIFETIME} minutes (or until VM_STOP is set)..."

          ELAPSED=0
          while [ "$ELAPSED" -lt "$(( LIFETIME * 60 ))" ]; do
            STOP=$(gh variable get VM_STOP 2>/dev/null || true)
            if [ -n "$STOP" ]; then
              echo "VM_STOP detected - caching state and shutting down."
              break
            fi
            sleep 10
            ELAPSED=$(( ELAPSED + 10 ))
          done

      - name: Run post-run script
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          CONTAINER=$(docker ps -q --filter name=toatvm --filter status=running 2>/dev/null || true)
          if [ -n "$CONTAINER" ]; then
            USERNAME=$(docker exec "$CONTAINER" cat /etc/toatvm/user 2>/dev/null || echo "toat")
            docker exec "$CONTAINER" su - "$USERNAME" -c "/etc/toatvm/post-run.sh" 2>/dev/null || true
          fi

      - name: Save VM state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            vm-state
          key: toatvm-state-${{ github.run_id }}

      - name: Re-dispatch next session
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STOP=$(gh variable get VM_STOP 2>/dev/null || true)
          if [ -n "$STOP" ]; then
            echo "VM_STOP set - stopping the cycle."
            gh variable delete VM_STOP --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
            exit 0
          fi
          gh workflow run vm.yml --ref "$GITHUB_REF_NAME" \
            -f lifetime="${{ github.event.inputs.lifetime || '60' }}" \
            -f username="${{ github.event.inputs.username || 'toat' }}" \
            -f password="${{ github.event.inputs.password }}" \
            -f image="${{ github.event.inputs.image || 'ubuntu:latest' }}" \
            -f env="${{ github.event.inputs.env || '{}' }}" \
            -f pre-run="${{ github.event.inputs.pre-run || '' }}" \
            -f post-run="${{ github.event.inputs.post-run || '' }}" \
            -f disk-size="${{ github.event.inputs.disk-size || '10' }}" \
            -f cpu-limit="${{ github.event.inputs.cpu-limit || '1' }}" \
            -f mem-limit="${{ github.event.inputs.mem-limit || '2' }}" \
            -f ports="${{ github.event.inputs.ports || '' }}" \
            -f label="${{ github.event.inputs.label || '' }}"
          echo "Re-dispatched ToatVM. State was cached for the next run."
