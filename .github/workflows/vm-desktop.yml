name: ToatVM Desktop

# A graphical desktop inside a GitHub Actions runner. This workflow installs
# XFCE (a lightweight desktop), a TigerVNC server, and noVNC (a browser VNC
# client served over WebSocket via websockify), then tunnels noVNC to the
# public internet with cloudflared. Open the tunnel URL's /vnc.html in the
# ToatVM site's "Desktop" tab to get a full GUI.
#
# New in 0.3.0:
#   - Environment variables passed into the container
#   - Pre-run / post-run scripts
#   - Resource limits and disk size
#   - Session templates via workflow inputs
#   - VNC geometry options
#   - Port forwards

on:
  workflow_dispatch:
    inputs:
      lifetime:
        description: "Minutes each cycle runs before caching + restart"
        required: false
        default: "60"
      geometry:
        description: "VNC geometry (e.g. 1280x720, 1920x1080)"
        required: false
        default: "1280x720"
      env:
        description: "Environment variables (JSON object)"
        required: false
        default: "{}"
      pre-run:
        description: "Shell script to run inside the VM before starting the desktop"
        required: false
        default: ""
      post-run:
        description: "Shell script to run inside the VM after the cycle ends"
        required: false
        default: ""
      disk-size:
        description: "Disk size for the container (GB)"
        required: false
        default: "10"
      cpu-limit:
        description: "CPU limit for the container (cores)"
        required: false
        default: "1"
      mem-limit:
        description: "Memory limit for the container (GB)"
        required: false
        default: "2"
      ports:
        description: "Port forwards (host:container,...)"
        required: false
        default: ""
      label:
        description: "Session label"
        required: false
        default: ""
  repository_dispatch:
    types: [toatvm-desktop-boot]

concurrency:
  group: toatvm-desktop
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore VM state
        uses: actions/cache/restore@v4
        with:
          path: |
            vm-state
          key: toatvm-desktop-state-${{ github.run_id }}
          restore-keys: |
            toatvm-desktop-state-

      - name: Install desktop (XFCE + TigerVNC + noVNC + jq)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            xfce4 xfce4-goodies \
            tigervnc-standalone-server \
            novnc websockify \
            dbus-x11 jq
          echo "desktop memory: $(free -h | awk '/Mem/ {print $2}')"

      - name: Parse inputs
        id: inputs
        env:
          INPUT_ENV: ${{ github.event.inputs.env || '{}' }}
        run: |
          echo "geometry=$(echo '${{ github.event.inputs.geometry || '1280x720' }}' | tr -d ' ')" >> "$GITHUB_OUTPUT"
          echo "cpu=$(echo '${{ github.event.inputs.cpu-limit || '1' }}' | tr -d ' ')" >> "$GITHUB_OUTPUT"
          echo "mem=$(echo '${{ github.event.inputs.mem-limit || '2' }}' | tr -d ' ')" >> "$GITHUB_OUTPUT"
          echo "disk=$(echo '${{ github.event.inputs.disk-size || '10' }}' | tr -d ' ')" >> "$GITHUB_OUTPUT"
          echo "pre=$(cat <<'EOF'
          ${{ github.event.inputs.pre-run || '' }}
          EOF
          )" >> "$GITHUB_OUTPUT"
          echo "post=$(cat <<'EOF'
          ${{ github.event.inputs.post-run || '' }}
          EOF
          )" >> "$GITHUB_OUTPUT"

      - name: Boot desktop session
        id: boot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p vm-state
          if [ ! -f vm-state/.booted ]; then
            echo "Welcome to ToatVM Desktop - first boot $(date -u)" > vm-state/.booted
          fi

          GEOMETRY="${{ steps.inputs.outputs.geometry }}"
          CPU_LIMIT="${{ steps.inputs.outputs.cpu }}"
          MEM_LIMIT="${{ steps.inputs.outputs.mem }}"
          DISK_SIZE="${{ steps.inputs.outputs.disk }}"
          PRE_RUN="${{ steps.inputs.outputs.pre }}"
          POST_RUN="${{ steps.inputs.outputs.post }}"

          PORTS_ARGS=""
          if [ -n "${{ github.event.inputs.ports }}" ]; then
            IFS=',' read -ra PORTS <<< "${{ github.event.inputs.ports }}"
            for p in "${PORTS[@]}"; do
              PORTS_ARGS="$PORTS_ARGS -p $p"
            done
          fi

          mkdir -p "$HOME/.vnc"
          printf 'toatvm\n' | vncpasswd -f > "$HOME/.vnc/passwd" 2>/dev/null || true
          chmod 600 "$HOME/.vnc/passwd" 2>/dev/null || true

          cat > "$HOME/.vnc/xstartup" <<'EOF'
          #!/bin/sh
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          exec startxfce4
          EOF
          chmod +x "$HOME/.vnc/xstartup"

          docker rm -f toatvm 2>/dev/null || true
          docker run -d --name toatvm \
            --cpus="${CPU_LIMIT}" \
            --memory="${MEM_LIMIT}g" \
            --storage-opt size="${DISK_SIZE}G" \
            $PORTS_ARGS \
            -v "$PWD/vm-state":/home/toatvm \
            ubuntu:latest sleep infinity

          docker exec toatvm sh -c "
            useradd -M -s /bin/bash toatvm 2>/dev/null || adduser -D toatvm 2>/dev/null || true
            echo 'toatvm:toatvm' | chpasswd 2>/dev/null || echo 'toatvm' | passwd --stdin toatvm 2>/dev/null || true
            chown -R toatvm /home/toatvm 2>/dev/null || true
            usermod -aG sudo toatvm 2>/dev/null || usermod -aG wheel toatvm 2>/dev/null || true
            mkdir -p /etc/toatvm
            echo \"$PRE_RUN\" > /etc/toatvm/pre-run.sh
            chmod +x /etc/toatvm/pre-run.sh
            echo \"$POST_RUN\" > /etc/toatvm/post-run.sh
            chmod +x /etc/toatvm/post-run.sh
          " || true

          ENV_JSON="${{ github.event.inputs.env || '{}' }}"
          ENV_LINES=$(echo "$ENV_JSON" | jq -r 'to_entries[]? | "\(.key)=\(.value)"' 2>/dev/null || true)

          if [ -n "$ENV_LINES" ]; then
            while IFS='=' read -r key value; do
              [ -z "$key" ] && continue
              docker exec toatvm sh -c "echo '$key=$value' >> /etc/environment" || true
            done <<< "$ENV_LINES"
          fi

          if [ -n "$PRE_RUN" ]; then
            docker exec toatvm su - toatvm -c "/etc/toatvm/pre-run.sh" 2>/dev/null || true
          fi

          vncserver :1 -geometry "$GEOMETRY" -depth 24 -SecurityTypes None \
            || vncserver :1 -geometry "$GEOMETRY" -depth 24

          nohup websockify --web /usr/share/novnc 6080 localhost:5901 \
            >/tmp/novnc.log 2>&1 &

          nohup cloudflared tunnel --url http://localhost:6080 --no-autoupdate \
            >/tmp/cf.log 2>&1 &

          for i in $(seq 1 60); do
            URL=$(grep -oE 'https://[a-z0-9.-]+\.trycloudflare\.com' /tmp/cf.log | head -n1 || true)
            if [ -n "$URL" ]; then break; fi
            sleep 2
          done

          if [ -z "$URL" ]; then
            echo "::error::Could not establish tunnel"; cat /tmp/cf.log; exit 1
          fi

          echo "VM_URL=$URL" >> "$GITHUB_OUTPUT"
          echo "ToatVM Desktop is live at $URL"
          echo "Open: $URL/vnc.html?path=websockify&resize=scale&autoconnect=true"
          echo "ToatVM Desktop is live at $URL" >> "$GITHUB_STEP_SUMMARY"
          gh variable set VM_URL --body "$URL" --repo "$GITHUB_REPOSITORY" \
            2>/dev/null || echo "note: VM_URL variable not set (needs workflow write perms; logs still work)"

          if [ -n "${{ github.event.inputs.label }}" ]; then
            gh variable set VM_LABEL --body "${{ github.event.inputs.label }}" --repo "$GITHUB_REPOSITORY" \
              2>/dev/null || true
          fi

          LIFETIME="${{ github.event.inputs.lifetime || '60' }}"
          echo "Desktop up. Running cycle for ${LIFETIME} minutes (or until VM_STOP)..."

          ELAPSED=0
          while [ "$ELAPSED" -lt "$(( LIFETIME * 60 ))" ]; do
            STOP=$(gh variable get VM_STOP 2>/dev/null || true)
            if [ -n "$STOP" ]; then
              echo "VM_STOP detected - caching state and shutting down."
              break
            fi
            sleep 10
            ELAPSED=$(( ELAPSED + 10 ))
          done

      - name: Run post-run script
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          CONTAINER=$(docker ps -q --filter name=toatvm --filter status=running 2>/dev/null || true)
          if [ -n "$CONTAINER" ]; then
            docker exec "$CONTAINER" su - toatvm -c "/etc/toatvm/post-run.sh" 2>/dev/null || true
          fi

      - name: Save VM state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            vm-state
          key: toatvm-desktop-state-${{ github.run_id }}

      - name: Re-dispatch next session
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run vm-desktop.yml --ref "$GITHUB_REF_NAME" \
            -f lifetime="${{ github.event.inputs.lifetime || '60' }}" \
            -f geometry="${{ steps.inputs.outputs.geometry }}" \
            -f env="${{ github.event.inputs.env || '{}' }}" \
            -f pre-run="${{ github.event.inputs.pre-run || '' }}" \
            -f post-run="${{ github.event.inputs.post-run || '' }}" \
            -f disk-size="${{ github.event.inputs.disk-size || '10' }}" \
            -f cpu-limit="${{ github.event.inputs.cpu-limit || '1' }}" \
            -f mem-limit="${{ github.event.inputs.mem-limit || '2' }}" \
            -f ports="${{ github.event.inputs.ports || '' }}" \
            -f label="${{ github.event.inputs.label || '' }}"
          echo "Re-dispatched ToatVM Desktop."
