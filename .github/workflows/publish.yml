name: Publish CLI to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install & build ToatVM CLI
        working-directory: cli
        run: |
          npm ci
          npm run build
      - name: Publish ToatVM CLI
        working-directory: cli
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Install & build ToatVM Lite
        working-directory: cli-lite
        run: |
          npm ci
          npm run build
      - name: Publish ToatVM Lite
        working-directory: cli-lite
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
