name: CI

# Proves the frontend actually builds (tsc + vite) on a clean machine.
# A green check here means `npm run build` passes on the committed code.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
